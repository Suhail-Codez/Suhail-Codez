<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline — IDPDR</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0A0F1E;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    padding:24px;text-align:center;}
  .box{max-width:380px;}
  .icon{font-size:48px;margin-bottom:12px;}
  h1{font-size:1.2rem;margin:0 0 8px;}
  p{color:#94A3B8;font-size:.9rem;line-height:1.5;margin:0 0 20px;}
  button{background:#00C2FF;color:#000;border:none;border-radius:10px;padding:12px 20px;
    font-weight:700;font-size:.9rem;cursor:pointer;min-height:44px;min-width:44px;}
</style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>IDPDR can't reach the server right now. Check your connection — anything you already
       opened is still available, but predictions and drug data need a live connection.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
