# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then in Render click
# New -> Blueprint and point it at the repo. Render reads this file
# automatically and provisions the web service + a free Postgres DB.
services:
  - type: web
    name: idpdr
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_EXTRA_ORIGINS
        value: "https://idpdr.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: idpdr-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: idpdr-db
    plan: free
